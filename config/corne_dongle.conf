# Dongle Configuration
CONFIG_ZMK_KEYBOARD_NAME="Corne Dongle"

# Split keyboard settings - dongle is central
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# Bluetooth settings for dongle
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n

# Enable ZMK Studio for real-time keymap updates
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_STUDIO_LOCKING=n

# Enable mouse keys
CONFIG_ZMK_POINTING=y

# Sleep settings
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# USB settings for dongle (acts as USB HID device)
CONFIG_ZMK_USB=y
