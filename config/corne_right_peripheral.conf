# Right Peripheral Configuration
CONFIG_ZMK_KEYBOARD_NAME="Corne Right"

# Split keyboard settings - peripheral
CONFIG_ZMK_SPLIT=y

# Bluetooth settings for peripheral
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n

# Sleep settings
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# Battery reporting
CONFIG_ZMK_BATTERY_VOLTAGE_DIVIDER=y
